services:
  - type: web
    name: world-cup-intelligence
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && cd app && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "cd app && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ""
